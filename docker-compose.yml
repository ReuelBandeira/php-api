services:
    postgres:
        image: postgres:15-alpine
        container_name: postgres-service
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        environment:
            - POSTGRES_PASSWORD=secret
            - POSTGRES_USER=postgres
            - POSTGRES_DB=medical
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 10

    migrations:
        build:
            context: .
            dockerfile: Dockerfile.migrations
        container_name: migrations-service
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            - APP_ENV=local
            - APP_DEBUG=true
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=medical
            - DB_USERNAME=postgres
            - DB_PASSWORD=secret
            - APP_KEY=base64:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        restart: "no"

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: medical-api-service
        depends_on:
            migrations:
                condition: service_completed_successfully
        ports:
            - "8000:8000"
        environment:
            - APP_ENV=local
            - APP_DEBUG=true
            - APP_KEY=base64:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=medical
            - DB_USERNAME=postgres
            - DB_PASSWORD=secret
        volumes:
            # Para desenvolvimento - sincronizar código
            - ./storage/app/public:/var/www/html/storage/app/public
            - ./storage/logs:/var/www/html/storage/logs
        tmpfs:
            # Usar tmpfs para arquivos temporários (melhora performance e evita problemas de permissão)
            - /var/www/html/storage/framework/cache:noexec,nosuid,size=100m
            - /var/www/html/storage/framework/sessions:noexec,nosuid,size=100m
            - /var/www/html/storage/framework/views:noexec,nosuid,size=100m

volumes:
    postgres-data:
