version: "3.8"

services:
    postgres:
        image: postgres:15-alpine
        container_name: postgres-service
        ports:
            - 5432:5432
        volumes:
            - postgres-data:/var/lib/postgresql/data
        environment:
            - POSTGRES_PASSWORD=secret
            - POSTGRES_USER=postgres
            - POSTGRES_DB=medical
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5

    migrations:
        build:
            context: .
            dockerfile: Dockerfile.migrations
        container_name: migrations-service
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            - APP_ENV=local
            - APP_DEBUG=true
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=medical
            - DB_USERNAME=postgres
            - DB_PASSWORD=secret
        restart: "no"

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: medical-api-service
        depends_on:
            migrations:
                condition: service_completed_successfully
        ports:
            - 8000:8000
        environment:
            - APP_ENV=local
            - APP_DEBUG=true
            - APP_KEY=base64:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=medical
            - DB_USERNAME=postgres
            - DB_PASSWORD=secret
        volumes:
            - ./:/var/www/html
            - /var/www/html/vendor
            - /var/www/html/storage/framework/cache
            - /var/www/html/storage/framework/sessions
            - /var/www/html/storage/framework/views

volumes:
    postgres-data:
